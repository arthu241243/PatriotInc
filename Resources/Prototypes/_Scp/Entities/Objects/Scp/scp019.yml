- type: entity
  id: Scp019
  parent:
  - BaseStructure
  - BaseScpArtifactMinor
  name: black vase
  description: Large ceramic vase with ancient Greek style and decor.
  suffix: SCP-019
  components:
  - type: Sprite
    sprite: _Scp/Objects/Scp/scp-019.rsi
    state: icon
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.45,0.25,0.45"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: Anchorable
  - type: Clickable
  - type: InteractionOutline
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 2
            max: 4
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 2
            max: 4
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 2
            max: 4
          Scp019MonsterBasic:
            min: 1
            max: 2
    - trigger:
        !type:DamageTrigger
        damage: 3500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 2
            max: 4
          Scp019MonsterBasic:
            min: 1
            max: 2
          Scp019MonsterFast:
            min: 1
            max: 2
    - trigger:
        !type:DamageTrigger
        damage: 5000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 2
            max: 4
          Scp019MonsterBasic:
            min: 2
            max: 3
          Scp019MonsterFast:
            min: 1
            max: 2
    - trigger:
        !type:DamageTrigger
        damage: 7500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 3
            max: 5
          Scp019MonsterBasic:
            min: 2
            max: 3
          Scp019MonsterFast:
            min: 1
            max: 2
    - trigger:
        !type:DamageTrigger
        damage: 10000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Scp019MonsterSapient:
            min: 2
            max: 3
          Scp019MonsterBasic:
            min: 2
            max: 4
          Scp019MonsterFast:
            min: 2
            max: 4
          Scp019GlassShard:
            min: 2
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: DamageVisuals
    thresholds: [250, 500, 1000, 1500, 2000]
    damageDivisor: 4
    trackAllDamage: true
    damageOverlay:
      sprite: _Scp/Objects/Scp/scp-019-cracks.rsi
  - type: DamageOverlay
    damagePopupType: SmallFloating
    isStructure: true
  - type: Scp
    class: Keter
  - type: GuideHelp
    guides:
    - ScpResearch
  - type: RepeatingTrigger
    keyOut: basicSpawn
    delay: 180
  - type: SpawnEntityTableOnTrigger
    keysIn: [ basicSpawn ]
    useMapCoords: true
    table: !type:GroupSelector
      children:
      - id: Scp019MonsterBasic
      - id: Scp019MonsterFast
      - id: Scp019MonsterSapient
  - type: JitterOnTrigger
    keysIn: [ basicSpawn ]
    time: 1
  - type: XenoArtifact
    effectsTable: !type:GroupSelector
      children:
      - !type:NestedSelector
        tableId: ScpArtifactEffectsDefaultTable
        weight: 1
      - !type:NestedSelector
        tableId: ScpEffectMonsterSpawn019
        weight: 3
  - type: StatusEffects
    allowed:
    - Jitter
  - type: Tag
    tags:
    - Scp019Vase
  - type: Appearance
